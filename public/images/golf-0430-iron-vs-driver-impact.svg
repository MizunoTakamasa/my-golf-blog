<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ドライバーのアッパーブローとアイアンのダウンブローのインパクト軌道の違いを示した図">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .stl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 16px; font-weight: 700; fill: #fff; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
      .keypt { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; font-weight: 700; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
    <marker id="arr-orange" markerWidth="12" markerHeight="12" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 9 4, 0 8" fill="#e67e22"/>
    </marker>
    <marker id="arr-green" markerWidth="12" markerHeight="12" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 9 4, 0 8" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="800" height="540" fill="#f7faf7"/>
  <text x="400" y="40" class="ttl" text-anchor="middle">インパクトの違い｜アッパーブロー vs ダウンブロー</text>

  <line x1="400" y1="70" x2="400" y2="510" stroke="#ddd" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- ========================= -->
  <!-- LEFT: ドライバー = アッパーブロー -->
  <rect x="60" y="70" width="290" height="38" rx="6" fill="#e67e22"/>
  <text x="205" y="95" class="stl" text-anchor="middle">ドライバー｜アッパーブロー</text>

  <!-- Ground -->
  <line x1="50" y1="380" x2="350" y2="380" stroke="#666" stroke-width="2"/>
  <!-- Tee -->
  <line x1="240" y1="380" x2="240" y2="335" stroke="#a06030" stroke-width="2"/>
  <!-- Ball on tee -->
  <circle cx="240" cy="330" r="10" fill="#fff" stroke="#333" stroke-width="2"/>

  <!-- Swing arc lowest point -->
  <circle cx="180" cy="370" r="5" fill="#666"/>
  <text x="120" y="368" class="note" text-anchor="end">最下点</text>

  <!-- Swing arc curve (going UP through ball position) -->
  <path d="M 80 320 Q 130 380 180 370 Q 220 365 240 330 Q 280 280 320 240" fill="none" stroke="#e67e22" stroke-width="3.5"/>

  <!-- Arrow at impact showing UPWARD direction -->
  <path d="M 230 340 L 252 318" stroke="#e67e22" stroke-width="3" marker-end="url(#arr-orange)"/>

  <!-- impact label -->
  <text x="240" y="408" class="keypt" text-anchor="middle" fill="#e67e22">ボールに当たる</text>
  <text x="240" y="426" class="lbl" text-anchor="middle" fill="#e67e22">＝最下点を過ぎた後</text>

  <!-- Sun / launch arrow -->
  <text x="290" y="225" class="keypt" fill="#e67e22">↗ 上昇軌道</text>

  <!-- Description -->
  <rect x="60" y="450" width="290" height="60" rx="6" fill="#e67e22" opacity="0.1" stroke="#e67e22" stroke-width="1.5"/>
  <text x="80" y="472" class="lbl" fill="#d35400">★ボールを「救い上げる」</text>
  <text x="80" y="490" class="note">　軌道が上昇に転じた地点で打つ</text>
  <text x="80" y="506" class="note">　→ 飛距離を稼ぐ（バックスピン少なめ）</text>

  <!-- ========================= -->
  <!-- RIGHT: アイアン = ダウンブロー -->
  <rect x="450" y="70" width="290" height="38" rx="6" fill="#27ae60"/>
  <text x="595" y="95" class="stl" text-anchor="middle">アイアン｜ダウンブロー</text>

  <!-- Ground (with grass texture) -->
  <line x1="440" y1="380" x2="740" y2="380" stroke="#27ae60" stroke-width="2"/>
  <!-- Grass marks -->
  <line x1="460" y1="380" x2="463" y2="375" stroke="#27ae60" stroke-width="1"/>
  <line x1="475" y1="380" x2="478" y2="374" stroke="#27ae60" stroke-width="1"/>
  <line x1="500" y1="380" x2="503" y2="375" stroke="#27ae60" stroke-width="1"/>
  <line x1="520" y1="380" x2="523" y2="374" stroke="#27ae60" stroke-width="1"/>
  <line x1="700" y1="380" x2="703" y2="374" stroke="#27ae60" stroke-width="1"/>
  <line x1="715" y1="380" x2="718" y2="375" stroke="#27ae60" stroke-width="1"/>

  <!-- Ball on ground -->
  <circle cx="600" cy="372" r="8" fill="#fff" stroke="#333" stroke-width="2"/>

  <!-- Turf divot AFTER ball position -->
  <path d="M 615 380 L 625 388 L 660 388 L 670 380 Z" fill="#8b6f47" opacity="0.7"/>
  <text x="650" y="406" class="note" fill="#8b6f47">↑ターフ</text>

  <!-- Swing arc lowest point AFTER ball -->
  <circle cx="640" cy="385" r="5" fill="#666"/>
  <text x="640" y="430" class="note" text-anchor="middle">最下点</text>
  <text x="640" y="446" class="note" text-anchor="middle">（ボールの先）</text>

  <!-- Swing arc curve (going DOWN through ball position) -->
  <path d="M 460 250 Q 520 290 600 372 Q 620 380 640 385 Q 680 380 720 360" fill="none" stroke="#27ae60" stroke-width="3.5"/>

  <!-- Arrow at impact showing DOWNWARD direction -->
  <path d="M 588 360 L 608 380" stroke="#27ae60" stroke-width="3" marker-end="url(#arr-green)"/>

  <!-- impact label -->
  <text x="540" y="345" class="keypt" fill="#27ae60">↘ 下降軌道</text>

  <!-- ball-then-turf order arrow -->
  <text x="600" y="455" class="lbl" text-anchor="middle" fill="#27ae60">ボール → ターフの順</text>

  <!-- Description -->
  <rect x="450" y="465" width="290" height="60" rx="6" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="470" y="487" class="lbl" fill="#1e8449">★ボールを「上から押し込む」</text>
  <text x="470" y="505" class="note">　最下点に向かう途中で打つ</text>
  <text x="470" y="521" class="note">　→ ロフトでボールが上がる（スピン効く）</text>
</svg>
