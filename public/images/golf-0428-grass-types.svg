<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="soilPat" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#6d4c41"/>
      <circle cx="2" cy="2" r="0.6" fill="#5d4037"/>
      <circle cx="4" cy="4" r="0.6" fill="#4e342e"/>
    </pattern>
    <marker id="grainArr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">芝の種類と特徴｜日本のコースでよく出る3種類</text>
  <text x="410" y="50" text-anchor="middle" font-size="13" fill="#555">葉の太さと向きで、球の止まり方・転がり方が変わる</text>

  <line x1="277" y1="68" x2="277" y2="478" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="547" y1="68" x2="547" y2="478" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ============ Panel 1: 野芝 ============ -->
  <rect x="20" y="78" width="245" height="30" fill="#1e8449" rx="4"/>
  <text x="142" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">①野芝（のしば）</text>

  <rect x="35" y="280" width="225" height="65" fill="url(#soilPat)"/>
  <line x1="35" y1="280" x2="260" y2="280" stroke="#1e8449" stroke-width="2"/>

  <!-- Thick vertical blades -->
  <g stroke="#1e8449" stroke-linecap="round" stroke-width="3.5">
    <line x1="50" y1="280" x2="50" y2="245"/>
    <line x1="64" y1="280" x2="64" y2="238"/>
    <line x1="78" y1="280" x2="78" y2="248"/>
    <line x1="92" y1="280" x2="92" y2="240"/>
    <line x1="106" y1="280" x2="106" y2="250"/>
    <line x1="120" y1="280" x2="120" y2="244"/>
    <line x1="164" y1="280" x2="164" y2="247"/>
    <line x1="178" y1="280" x2="178" y2="240"/>
    <line x1="192" y1="280" x2="192" y2="248"/>
    <line x1="206" y1="280" x2="206" y2="243"/>
    <line x1="220" y1="280" x2="220" y2="246"/>
    <line x1="234" y1="280" x2="234" y2="240"/>
    <line x1="248" y1="280" x2="248" y2="245"/>
  </g>
  <!-- Lighter shade highlights -->
  <g stroke="#27ae60" stroke-linecap="round" stroke-width="1.5">
    <line x1="50" y1="278" x2="50" y2="248"/>
    <line x1="64" y1="278" x2="64" y2="241"/>
    <line x1="78" y1="278" x2="78" y2="251"/>
    <line x1="92" y1="278" x2="92" y2="243"/>
    <line x1="106" y1="278" x2="106" y2="253"/>
    <line x1="164" y1="278" x2="164" y2="250"/>
    <line x1="178" y1="278" x2="178" y2="243"/>
    <line x1="192" y1="278" x2="192" y2="251"/>
    <line x1="220" y1="278" x2="220" y2="249"/>
    <line x1="234" y1="278" x2="234" y2="243"/>
    <line x1="248" y1="278" x2="248" y2="248"/>
  </g>

  <!-- Ball sitting up on top -->
  <circle cx="142" cy="237" r="11" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <circle cx="139" cy="234" r="1.6" fill="#ddd"/>
  <circle cx="146" cy="236" r="1.4" fill="#ddd"/>
  <circle cx="142" cy="240" r="1.4" fill="#ddd"/>
  <text x="142" y="220" text-anchor="middle" font-size="9" fill="#1e8449" font-weight="bold">球が浮きやすい</text>

  <rect x="30" y="365" width="225" height="100" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5" rx="4"/>
  <text x="142" y="385" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">太くて硬い葉</text>
  <text x="142" y="405" text-anchor="middle" font-size="10" fill="#0e6251">FW・ラフ・ティー</text>
  <text x="142" y="425" text-anchor="middle" font-size="10" fill="#0e6251">ラフは球が沈みやすい</text>
  <text x="142" y="445" text-anchor="middle" font-size="10" fill="#0e6251">→ 短く持って強く振り抜く</text>

  <!-- ============ Panel 2: コウライ ============ -->
  <rect x="290" y="78" width="245" height="30" fill="#229954" rx="4"/>
  <text x="412" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">②コウライ芝</text>

  <rect x="305" y="280" width="225" height="65" fill="url(#soilPat)"/>
  <line x1="305" y1="280" x2="530" y2="280" stroke="#229954" stroke-width="2"/>

  <!-- Slanted blades (showing grain) -->
  <g stroke="#229954" stroke-linecap="round" stroke-width="2.5">
    <line x1="318" y1="280" x2="335" y2="252"/>
    <line x1="332" y1="280" x2="349" y2="248"/>
    <line x1="346" y1="280" x2="363" y2="254"/>
    <line x1="360" y1="280" x2="377" y2="250"/>
    <line x1="374" y1="280" x2="391" y2="252"/>
    <line x1="388" y1="280" x2="405" y2="248"/>
    <line x1="436" y1="280" x2="453" y2="251"/>
    <line x1="450" y1="280" x2="467" y2="248"/>
    <line x1="464" y1="280" x2="481" y2="254"/>
    <line x1="478" y1="280" x2="495" y2="250"/>
    <line x1="492" y1="280" x2="509" y2="253"/>
    <line x1="506" y1="280" x2="523" y2="249"/>
  </g>
  <g stroke="#52be80" stroke-linecap="round" stroke-width="1">
    <line x1="318" y1="278" x2="333" y2="254"/>
    <line x1="346" y1="278" x2="361" y2="256"/>
    <line x1="374" y1="278" x2="389" y2="254"/>
    <line x1="436" y1="278" x2="451" y2="253"/>
    <line x1="464" y1="278" x2="479" y2="256"/>
    <line x1="492" y1="278" x2="507" y2="255"/>
  </g>

  <!-- Grain direction arrow -->
  <line x1="320" y1="222" x2="510" y2="222" stroke="#c0392b" stroke-width="2" marker-end="url(#grainArr)"/>
  <text x="415" y="215" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">芝目（順目方向）</text>

  <!-- Ball partially in -->
  <circle cx="412" cy="265" r="11" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <circle cx="409" cy="262" r="1.5" fill="#ddd"/>
  <circle cx="416" cy="264" r="1.3" fill="#ddd"/>
  <circle cx="412" cy="268" r="1.3" fill="#ddd"/>

  <rect x="300" y="365" width="225" height="100" fill="#e8f6ef" stroke="#229954" stroke-width="1.5" rx="4"/>
  <text x="412" y="385" text-anchor="middle" font-size="11" fill="#229954" font-weight="bold">横向きに伸びる葉</text>
  <text x="412" y="405" text-anchor="middle" font-size="10" fill="#1d6f48">FW・グリーン</text>
  <text x="412" y="425" text-anchor="middle" font-size="10" fill="#1d6f48">順目逆目の影響が大きい</text>
  <text x="412" y="445" text-anchor="middle" font-size="10" fill="#1d6f48">→ 芝目を読んで打つ</text>

  <!-- ============ Panel 3: ベント ============ -->
  <rect x="560" y="78" width="245" height="30" fill="#52be80" rx="4"/>
  <text x="682" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">③ベント芝</text>

  <rect x="575" y="280" width="225" height="65" fill="url(#soilPat)"/>
  <line x1="575" y1="280" x2="800" y2="280" stroke="#52be80" stroke-width="2"/>

  <!-- Dense thin blades (canopy) -->
  <rect x="575" y="262" width="225" height="18" fill="#52be80" opacity="0.5"/>
  <g stroke="#1e8449" stroke-linecap="round" stroke-width="0.9">
    <line x1="580" y1="280" x2="581" y2="262"/>
    <line x1="585" y1="280" x2="585" y2="260"/>
    <line x1="590" y1="280" x2="591" y2="263"/>
    <line x1="595" y1="280" x2="595" y2="261"/>
    <line x1="600" y1="280" x2="601" y2="264"/>
    <line x1="605" y1="280" x2="605" y2="259"/>
    <line x1="610" y1="280" x2="611" y2="262"/>
    <line x1="615" y1="280" x2="615" y2="263"/>
    <line x1="620" y1="280" x2="621" y2="260"/>
    <line x1="625" y1="280" x2="625" y2="263"/>
    <line x1="630" y1="280" x2="631" y2="261"/>
    <line x1="635" y1="280" x2="635" y2="262"/>
    <line x1="640" y1="280" x2="641" y2="264"/>
    <line x1="645" y1="280" x2="645" y2="259"/>
    <line x1="650" y1="280" x2="651" y2="262"/>
    <line x1="655" y1="280" x2="655" y2="263"/>
    <line x1="660" y1="280" x2="661" y2="260"/>
    <line x1="665" y1="280" x2="665" y2="262"/>
    <line x1="670" y1="280" x2="671" y2="261"/>
    <line x1="675" y1="280" x2="675" y2="263"/>
    <line x1="700" y1="280" x2="701" y2="262"/>
    <line x1="705" y1="280" x2="705" y2="261"/>
    <line x1="710" y1="280" x2="711" y2="263"/>
    <line x1="715" y1="280" x2="715" y2="262"/>
    <line x1="720" y1="280" x2="721" y2="260"/>
    <line x1="725" y1="280" x2="725" y2="263"/>
    <line x1="730" y1="280" x2="731" y2="261"/>
    <line x1="735" y1="280" x2="735" y2="262"/>
    <line x1="740" y1="280" x2="741" y2="263"/>
    <line x1="745" y1="280" x2="745" y2="260"/>
    <line x1="750" y1="280" x2="751" y2="262"/>
    <line x1="755" y1="280" x2="755" y2="261"/>
    <line x1="760" y1="280" x2="761" y2="263"/>
    <line x1="765" y1="280" x2="765" y2="260"/>
    <line x1="770" y1="280" x2="771" y2="262"/>
    <line x1="775" y1="280" x2="775" y2="263"/>
    <line x1="780" y1="280" x2="781" y2="261"/>
    <line x1="785" y1="280" x2="785" y2="262"/>
    <line x1="790" y1="280" x2="791" y2="260"/>
    <line x1="795" y1="280" x2="795" y2="263"/>
  </g>

  <!-- Ball nestled -->
  <circle cx="687" cy="263" r="11" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <circle cx="684" cy="260" r="1.5" fill="#ddd"/>
  <circle cx="691" cy="262" r="1.3" fill="#ddd"/>
  <circle cx="687" cy="266" r="1.3" fill="#ddd"/>
  <text x="687" y="246" text-anchor="middle" font-size="9" fill="#1e8449" font-weight="bold">球がふわっと乗る</text>

  <rect x="570" y="365" width="225" height="100" fill="#eafaf1" stroke="#52be80" stroke-width="1.5" rx="4"/>
  <text x="682" y="385" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">細くて柔らかい葉</text>
  <text x="682" y="405" text-anchor="middle" font-size="10" fill="#1d6f48">主にグリーン（洋芝）</text>
  <text x="682" y="425" text-anchor="middle" font-size="10" fill="#1d6f48">速い・芝目の影響は少なめ</text>
  <text x="682" y="445" text-anchor="middle" font-size="10" fill="#1d6f48">→ 傾斜中心で読む</text>

  <text x="410" y="492" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">→ 同じコースでもエリアで芝が違う。FWは野芝・コウライ、グリーンはベントが多い</text>
</svg>
