    <path d="M 108 192 Q 102 240 112 268 L 168 268 Q 178 240 172 192 Q 170 178 158 172 Q 138 168 122 172 Q 110 178 108 192 Z" fill="#bdc3c7" stroke="#555" stroke-width="1.5"/>
