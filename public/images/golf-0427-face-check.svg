  </g>

  <text x="392" y="100" text-anchor="end" font-size="11" fill="#1e8449" font-weight="bold">左前腕</text>
  <text x="400" y="153" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">頭</text>

  <rect x="280" y="355" width="240" height="28" fill="#1e8449" rx="4"/>
  <text x="400" y="374" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">②スクエア（◎）</text>

  <rect x="290" y="395" width="220" height="110" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5" rx="4"/>
  <text x="400" y="416" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">前腕と「平行」</text>
  <text x="400" y="445" text-anchor="middle" font-size="14" fill="#0e6251" font-weight="bold">→ 球が真っすぐ</text>
  <text x="400" y="468" text-anchor="middle" font-size="11" fill="#0e6251">理想の形</text>
  <text x="400" y="488" text-anchor="middle" font-size="10" fill="#0e6251">そのままインパクトでスクエア</text>

  <!-- ============= Panel 3: Closed ============= -->
  <g transform="matrix(-1,0,0,1,1320,0)">
    <line x1="555" y1="345" x2="765" y2="345" stroke="#aaa" stroke-width="1"/>
    <line x1="625" y1="78" x2="600" y2="50" stroke="#5F5E5A" stroke-width="3"/>
