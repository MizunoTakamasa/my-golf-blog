  <rect x="550" y="395" width="220" height="110" fill="#fdebd0" stroke="#d68910" stroke-width="1.5" rx="4"/>
  <text x="660" y="416" text-anchor="middle" font-size="12" fill="#d68910" font-weight="bold">前腕より「寝て」いる</text>
  <text x="660" y="445" text-anchor="middle" font-size="14" fill="#9c640c" font-weight="bold">→ 球が左へ</text>
  <text x="660" y="468" text-anchor="middle" font-size="11" fill="#9c640c">フック・プル</text>
  <text x="660" y="488" text-anchor="middle" font-size="10" fill="#9c640c">フェースが被ったまま当たる</text>

  <text x="390" y="525" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">→ 鏡 or スマホで真後ろからスロー動画を撮ると一発でわかる</text>
</svg>
