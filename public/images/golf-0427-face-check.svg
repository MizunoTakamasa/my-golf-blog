  <text x="390" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">フェースの向きの目安｜トップで「左前腕」と「リーディングエッジ」が平行か</text>

  <line x1="265" y1="62" x2="265" y2="510" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="525" y1="62" x2="525" y2="510" stroke="#e0e0e0" stroke-width="1"/>

