<svg viewBox="0 0 780 510" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="fcArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>

  <text x="390" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">フェースの向きの目安｜トップで「左前腕」と「リーディングエッジ」が平行か</text>
  <text x="390" y="48" text-anchor="middle" font-size="12" fill="#555">右利きゴルファー・後ろから見た図（ビハインドビュー）／背中側から見た上半身</text>

  <!-- Vertical dividers -->
  <line x1="265" y1="62" x2="265" y2="490" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="525" y1="62" x2="525" y2="490" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ========================================================== -->
  <!-- Panel 1: Open                                              -->
  <!-- ========================================================== -->
  <g>
    <rect x="20" y="70" width="240" height="28" fill="#c0392b" rx="4"/>
    <text x="140" y="89" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">①開いている（×）</text>

    <!-- Ground line inside panel -->
    <line x1="35" y1="335" x2="245" y2="335" stroke="#aaa" stroke-width="1"/>

    <!-- Feet (turned, viewed from behind) -->
    <ellipse cx="118" cy="335" rx="17" ry="5" fill="#999" stroke="#666"/>
    <ellipse cx="160" cy="335" rx="17" ry="5" fill="#999" stroke="#666"/>

    <!-- Legs -->
    <rect x="111" y="252" width="14" height="83" fill="#d6dbdf" stroke="#888" rx="2"/>
    <rect x="153" y="252" width="14" height="83" fill="#d6dbdf" stroke="#888" rx="2"/>

    <!-- Hips (belt line) -->
    <rect x="108" y="246" width="62" height="10" fill="#7f8c8d" stroke="#444" rx="2"/>

    <!-- Torso (back view, slight right-tilt at top of backswing for RH golfer) -->
    <path d="M 105 175 Q 100 220 108 250 L 170 250 Q 178 220 173 175 Q 170 162 158 156 Q 138 152 120 156 Q 108 162 105 175 Z" fill="#bdc3c7" stroke="#555" stroke-width="1.5"/>

    <!-- Spine line (tilted slightly right - top of backswing posture) -->
    <line x1="142" y1="160" x2="135" y2="250" stroke="#566573" stroke-width="1.5" stroke-dasharray="3,3"/>

    <!-- Head -->
    <circle cx="138" cy="138" r="15" fill="#f5cba7" stroke="#333" stroke-width="1.5"/>
    <!-- Hair / back of head shading -->
    <path d="M 124 132 Q 138 121 152 132 Q 152 124 138 121 Q 124 124 124 132 Z" fill="#34495e"/>

    <!-- Lead arm (LEFT arm) - thick, crossing chest UP-RIGHT to hands at top -->
    <path d="M 108 180 Q 145 130 188 90" stroke="#333" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M 108 180 Q 145 130 188 90" stroke="#f5cba7" stroke-width="10" stroke-linecap="round" fill="none"/>
    <text x="55" y="200" font-size="10" fill="#c0392b" font-weight="bold">左前腕</text>

    <!-- Trail arm (RIGHT arm) - bent with elbow up -->
    <path d="M 168 175 Q 205 135 192 92" stroke="#333" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M 168 175 Q 205 135 192 92" stroke="#f5cba7" stroke-width="7" stroke-linecap="round" fill="none"/>

    <!-- Hands grip -->
    <circle cx="190" cy="90" r="9" fill="#f5cba7" stroke="#333" stroke-width="1.5"/>

    <!-- Club shaft going up-right -->
    <line x1="195" y1="85" x2="247" y2="40" stroke="#5F5E5A" stroke-width="3.5"/>

    <!-- Clubhead - face VERTICAL (open: leading edge perpendicular to ground) -->
    <rect x="241" y="22" width="6" height="36" fill="#888" stroke="#222" stroke-width="1.5"/>
    <line x1="240" y1="22" x2="240" y2="58" stroke="#c0392b" stroke-width="3"/>

    <!-- Annotation -->
    <text x="180" y="35" font-size="10" fill="#c0392b" font-weight="bold">エッジ</text>
    <text x="180" y="48" font-size="10" fill="#c0392b" font-weight="bold">が垂直</text>

    <!-- Forearm extension reference line -->
    <line x1="190" y1="90" x2="230" y2="50" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Body orientation indicator -->
    <text x="140" y="357" text-anchor="middle" font-size="10" fill="#3498db" font-weight="bold">背中＝ターゲット側 ／ 体は右へ捻転</text>

    <!-- Result box -->
    <rect x="30" y="368" width="220" height="115" fill="#fef5f4" stroke="#c0392b" stroke-width="1.5" rx="4"/>
    <text x="140" y="392" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">前腕より「立って」いる</text>
    <text x="140" y="423" text-anchor="middle" font-size="14" fill="#a93226" font-weight="bold">→ 球が右へ</text>
    <text x="140" y="448" text-anchor="middle" font-size="11" fill="#a93226">スライス・プッシュ</text>
    <text x="140" y="468" text-anchor="middle" font-size="10" fill="#a93226">フェースが開いたまま当たる</text>
  </g>

  <!-- ========================================================== -->
  <!-- Panel 2: Square (GOOD)                                     -->
  <!-- ========================================================== -->
  <g>
    <rect x="280" y="70" width="240" height="28" fill="#1e8449" rx="4"/>
    <text x="400" y="89" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">②スクエア（◎）</text>

    <line x1="295" y1="335" x2="505" y2="335" stroke="#aaa" stroke-width="1"/>

    <!-- Feet -->
    <ellipse cx="378" cy="335" rx="17" ry="5" fill="#999" stroke="#666"/>
    <ellipse cx="420" cy="335" rx="17" ry="5" fill="#999" stroke="#666"/>

    <!-- Legs -->
    <rect x="371" y="252" width="14" height="83" fill="#d6dbdf" stroke="#888" rx="2"/>
    <rect x="413" y="252" width="14" height="83" fill="#d6dbdf" stroke="#888" rx="2"/>

    <!-- Hips -->
    <rect x="368" y="246" width="62" height="10" fill="#7f8c8d" stroke="#444" rx="2"/>

    <!-- Torso -->
    <path d="M 365 175 Q 360 220 368 250 L 430 250 Q 438 220 433 175 Q 430 162 418 156 Q 398 152 380 156 Q 368 162 365 175 Z" fill="#bdc3c7" stroke="#555" stroke-width="1.5"/>

    <!-- Spine -->
    <line x1="402" y1="160" x2="395" y2="250" stroke="#566573" stroke-width="1.5" stroke-dasharray="3,3"/>

    <!-- Head -->
    <circle cx="398" cy="138" r="15" fill="#f5cba7" stroke="#333" stroke-width="1.5"/>
    <path d="M 384 132 Q 398 121 412 132 Q 412 124 398 121 Q 384 124 384 132 Z" fill="#34495e"/>

    <!-- Lead arm -->
    <path d="M 368 180 Q 405 130 448 90" stroke="#333" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M 368 180 Q 405 130 448 90" stroke="#f5cba7" stroke-width="10" stroke-linecap="round" fill="none"/>
    <text x="315" y="200" font-size="10" fill="#1e8449" font-weight="bold">左前腕</text>

    <!-- Trail arm -->
    <path d="M 428 175 Q 465 135 452 92" stroke="#333" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M 428 175 Q 465 135 452 92" stroke="#f5cba7" stroke-width="7" stroke-linecap="round" fill="none"/>

    <!-- Hands -->
    <circle cx="450" cy="90" r="9" fill="#f5cba7" stroke="#333" stroke-width="1.5"/>

    <!-- Club shaft -->
    <line x1="455" y1="85" x2="507" y2="40" stroke="#5F5E5A" stroke-width="3.5"/>

    <!-- Clubhead - face PARALLEL to lead forearm direction (square) -->
    <!-- Lead forearm goes from approx (450, 90) backward to (368, 180), angle ~48° from horizontal -->
    <!-- Club shaft continues in similar direction -->
    <!-- Square leading edge is parallel to that angle -->
    <g transform="rotate(-48 506 41)">
      <rect x="490" y="38" width="36" height="6" fill="#27ae60" stroke="#0e6251" stroke-width="1.5"/>
      <line x1="490" y1="36" x2="526" y2="36" stroke="#0e6251" stroke-width="3"/>
    </g>

    <!-- Annotation -->
    <text x="445" y="32" font-size="10" fill="#1e8449" font-weight="bold">前腕と</text>
    <text x="445" y="44" font-size="10" fill="#1e8449" font-weight="bold">完全に平行</text>

    <!-- Forearm extension reference - shows parallel relationship -->
    <line x1="450" y1="90" x2="510" y2="30" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>

    <text x="400" y="357" text-anchor="middle" font-size="10" fill="#3498db" font-weight="bold">背中＝ターゲット側 ／ 体は右へ捻転</text>

    <!-- Result box -->
    <rect x="290" y="368" width="220" height="115" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5" rx="4"/>
    <text x="400" y="392" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">前腕と「平行」</text>
    <text x="400" y="423" text-anchor="middle" font-size="14" fill="#0e6251" font-weight="bold">→ 球が真っすぐ</text>
    <text x="400" y="448" text-anchor="middle" font-size="11" fill="#0e6251">理想の形</text>
    <text x="400" y="468" text-anchor="middle" font-size="10" fill="#0e6251">そのままインパクトでスクエア</text>
  </g>

  <!-- ========================================================== -->
  <!-- Panel 3: Closed                                            -->
  <!-- ========================================================== -->
  <g>
    <rect x="540" y="70" width="240" height="28" fill="#d68910" rx="4"/>
    <text x="660" y="89" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">③閉じている（×）</text>

    <line x1="555" y1="335" x2="765" y2="335" stroke="#aaa" stroke-width="1"/>

    <!-- Feet -->
    <ellipse cx="638" cy="335" rx="17" ry="5" fill="#999" stroke="#666"/>
    <ellipse cx="680" cy="335" rx="17" ry="5" fill="#999" stroke="#666"/>

    <!-- Legs -->
    <rect x="631" y="252" width="14" height="83" fill="#d6dbdf" stroke="#888" rx="2"/>
    <rect x="673" y="252" width="14" height="83" fill="#d6dbdf" stroke="#888" rx="2"/>

    <!-- Hips -->
    <rect x="628" y="246" width="62" height="10" fill="#7f8c8d" stroke="#444" rx="2"/>

    <!-- Torso -->
    <path d="M 625 175 Q 620 220 628 250 L 690 250 Q 698 220 693 175 Q 690 162 678 156 Q 658 152 640 156 Q 628 162 625 175 Z" fill="#bdc3c7" stroke="#555" stroke-width="1.5"/>

    <!-- Spine -->
    <line x1="662" y1="160" x2="655" y2="250" stroke="#566573" stroke-width="1.5" stroke-dasharray="3,3"/>

    <!-- Head -->
    <circle cx="658" cy="138" r="15" fill="#f5cba7" stroke="#333" stroke-width="1.5"/>
    <path d="M 644 132 Q 658 121 672 132 Q 672 124 658 121 Q 644 124 644 132 Z" fill="#34495e"/>

    <!-- Lead arm -->
    <path d="M 628 180 Q 665 130 708 90" stroke="#333" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M 628 180 Q 665 130 708 90" stroke="#f5cba7" stroke-width="10" stroke-linecap="round" fill="none"/>
    <text x="575" y="200" font-size="10" fill="#d68910" font-weight="bold">左前腕</text>

    <!-- Trail arm -->
    <path d="M 688 175 Q 725 135 712 92" stroke="#333" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M 688 175 Q 725 135 712 92" stroke="#f5cba7" stroke-width="7" stroke-linecap="round" fill="none"/>

    <!-- Hands -->
    <circle cx="710" cy="90" r="9" fill="#f5cba7" stroke="#333" stroke-width="1.5"/>

    <!-- Club shaft -->
    <line x1="715" y1="85" x2="765" y2="40" stroke="#5F5E5A" stroke-width="3.5"/>

    <!-- Clubhead - face HORIZONTAL (closed: leading edge horizontal) -->
    <rect x="747" y="32" width="36" height="6" fill="#888" stroke="#222" stroke-width="1.5"/>
    <line x1="747" y1="30" x2="783" y2="30" stroke="#d68910" stroke-width="3"/>

    <!-- Annotation -->
    <text x="700" y="22" font-size="10" fill="#d68910" font-weight="bold">エッジが</text>
    <text x="700" y="34" font-size="10" fill="#d68910" font-weight="bold">水平</text>

    <!-- Forearm extension reference -->
    <line x1="710" y1="90" x2="755" y2="50" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>

    <text x="660" y="357" text-anchor="middle" font-size="10" fill="#3498db" font-weight="bold">背中＝ターゲット側 ／ 体は右へ捻転</text>

    <!-- Result box -->
    <rect x="550" y="368" width="220" height="115" fill="#fdebd0" stroke="#d68910" stroke-width="1.5" rx="4"/>
    <text x="660" y="392" text-anchor="middle" font-size="12" fill="#d68910" font-weight="bold">前腕より「寝て」いる</text>
    <text x="660" y="423" text-anchor="middle" font-size="14" fill="#9c640c" font-weight="bold">→ 球が左へ</text>
    <text x="660" y="448" text-anchor="middle" font-size="11" fill="#9c640c">フック・プル</text>
    <text x="660" y="468" text-anchor="middle" font-size="10" fill="#9c640c">フェースが被ったまま当たる</text>
  </g>

  <!-- Bottom hint -->
  <text x="390" y="503" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">→ 鏡 or スマホで真後ろからスロー動画を撮ると一発でわかる</text>
</svg>
