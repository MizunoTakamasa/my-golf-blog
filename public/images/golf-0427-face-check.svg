  <text x="140" y="445" text-anchor="middle" font-size="14" fill="#a93226" font-weight="bold">→ 球が右へ</text>
  <text x="140" y="468" text-anchor="middle" font-size="11" fill="#a93226">スライス・プッシュ</text>
  <text x="140" y="488" text-anchor="middle" font-size="10" fill="#a93226">フェースが開いたまま当たる</text>

