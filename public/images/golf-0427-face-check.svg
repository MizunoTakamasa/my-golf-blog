    <path d="M 648 138 Q 660 132 672 138" stroke="#5a3a22" stroke-width="1.2" fill="none" opacity="0.8"/>
    <ellipse cx="660" cy="170" rx="9" ry="3" fill="#2a1a0e" opacity="0.6"/>
  </g>

  <text x="652" y="100" text-anchor="end" font-size="11" fill="#d68910" font-weight="bold">左前腕</text>
  <text x="660" y="153" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">頭</text>

  <rect x="540" y="355" width="240" height="28" fill="#d68910" rx="4"/>
