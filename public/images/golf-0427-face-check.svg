  <text x="132" y="100" text-anchor="end" font-size="11" fill="#c0392b" font-weight="bold">左前腕</text>
  <text x="140" y="153" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">頭</text>

  <rect x="20" y="355" width="240" height="28" fill="#c0392b" rx="4"/>
