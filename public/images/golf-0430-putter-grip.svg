<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ゴルフのパターグリップ｜逆オーバーラッピング・クロスハンド・クロウグリップの3種類の握り方の比較図">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .stl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 16px; font-weight: 700; fill: #fff; }
      .sub { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 12px; fill: #fff; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 14px; fill: #333; }
      .keypt { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; font-weight: 700; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 12px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
    <marker id="arr-pink" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#e91e63"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#f7faf7"/>
  <text x="400" y="38" class="ttl" text-anchor="middle">パターのグリップ｜3つの握り方</text>
  <text x="400" y="60" class="cap" text-anchor="middle">＊「①と②は別物」がよく混同されるポイント</text>

  <!-- ============================ -->
  <!-- LEFT: 逆オーバーラッピング (Recommended) -->
  <rect x="40" y="80" width="220" height="60" rx="6" fill="#27ae60"/>
  <text x="150" y="105" class="stl" text-anchor="middle">① 逆オーバーラッピング</text>
  <text x="150" y="125" class="sub" text-anchor="middle">手は通常位置／指のかぶせが逆</text>
  <text x="150" y="160" class="note" text-anchor="middle" fill="#27ae60" font-weight="700">★初心者におすすめ</text>

  <!-- Down arrow indicating "上から下" reading -->
  <text x="20" y="195" class="keypt" fill="#888">上↓</text>

  <!-- Putter shaft vertical -->
  <rect x="140" y="180" width="20" height="280" rx="4" fill="#444"/>

  <!-- LEFT hand UP (top, normal position) -->
  <ellipse cx="150" cy="240" rx="42" ry="36" fill="#f9c896" stroke="#c39972" stroke-width="2.5"/>
  <text x="150" y="237" class="lbl" text-anchor="middle" font-weight="700">左手</text>
  <text x="150" y="252" class="note" text-anchor="middle">（上）</text>

  <!-- RIGHT hand DOWN (bottom, normal position) -->
  <ellipse cx="150" cy="370" rx="42" ry="36" fill="#fcd9b4" stroke="#c39972" stroke-width="2.5"/>
  <text x="150" y="367" class="lbl" text-anchor="middle" font-weight="700">右手</text>
  <text x="150" y="382" class="note" text-anchor="middle">（下）</text>

  <!-- left index finger going DOWN over right hand -->
  <path d="M 150 276 Q 130 305 128 345" fill="none" stroke="#e91e63" stroke-width="4.5" marker-end="url(#arr-pink)"/>
  <text x="20" y="320" class="keypt" fill="#e91e63" font-size="12">左人差し指</text>
  <text x="20" y="336" class="keypt" fill="#e91e63" font-size="12">↓を右手の上に</text>

  <text x="20" y="475" class="keypt" fill="#888">下↑</text>

  <!-- Bottom box: key point -->
  <rect x="40" y="490" width="220" height="80" rx="6" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="150" y="510" class="keypt" text-anchor="middle" fill="#27ae60">ポイント</text>
  <text x="150" y="528" class="note" text-anchor="middle">手の位置：通常通り</text>
  <text x="150" y="544" class="note" text-anchor="middle">（左手が上・右手が下）</text>
  <text x="150" y="562" class="note" text-anchor="middle" font-weight="700" fill="#c0392b">→ 左手首がロック</text>

  <!-- ============================ -->
  <!-- MIDDLE: クロスハンド -->
  <rect x="290" y="80" width="220" height="60" rx="6" fill="#3498db"/>
  <text x="400" y="105" class="stl" text-anchor="middle">② クロスハンド（左手下）</text>
  <text x="400" y="125" class="sub" text-anchor="middle">手の位置そのものを入れ替え</text>
  <text x="400" y="160" class="note" text-anchor="middle" fill="#3498db" font-weight="700">手首を使う癖が強い人向け</text>

  <text x="270" y="195" class="keypt" fill="#888">上↓</text>

  <!-- Putter shaft -->
  <rect x="390" y="180" width="20" height="280" rx="4" fill="#444"/>

  <!-- RIGHT hand UP (top, REVERSED position!) -->
  <ellipse cx="400" cy="240" rx="42" ry="36" fill="#fcd9b4" stroke="#c39972" stroke-width="2.5"/>
  <text x="400" y="237" class="lbl" text-anchor="middle" font-weight="700">右手</text>
  <text x="400" y="252" class="note" text-anchor="middle">（上に来る）</text>

  <!-- LEFT hand DOWN (bottom, REVERSED position!) -->
  <ellipse cx="400" cy="370" rx="42" ry="36" fill="#f9c896" stroke="#c39972" stroke-width="2.5"/>
  <text x="400" y="367" class="lbl" text-anchor="middle" font-weight="700">左手</text>
  <text x="400" y="382" class="note" text-anchor="middle">（下に来る）</text>

  <!-- Big swap arrow visual -->
  <path d="M 460 240 C 490 280 490 330 460 370" fill="none" stroke="#e91e63" stroke-width="2.5" stroke-dasharray="5,4"/>
  <path d="M 460 370 C 430 330 430 280 460 240" fill="none" stroke="#e91e63" stroke-width="2.5" stroke-dasharray="5,4"/>
  <text x="475" y="310" class="keypt" fill="#e91e63" font-size="12">↕入れ替え</text>

  <text x="270" y="475" class="keypt" fill="#888">下↑</text>

  <rect x="290" y="490" width="220" height="80" rx="6" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="1.5"/>
  <text x="400" y="510" class="keypt" text-anchor="middle" fill="#3498db">ポイント</text>
  <text x="400" y="528" class="note" text-anchor="middle">手の位置：上下を反転</text>
  <text x="400" y="544" class="note" text-anchor="middle">（左手が下・右手が上）</text>
  <text x="400" y="562" class="note" text-anchor="middle" font-weight="700" fill="#c0392b">→ 左肩主導で振れる</text>

  <!-- ============================ -->
  <!-- RIGHT: クロウグリップ -->
  <rect x="540" y="80" width="220" height="60" rx="6" fill="#9b59b6"/>
  <text x="650" y="105" class="stl" text-anchor="middle">③ クロウグリップ</text>
  <text x="650" y="125" class="sub" text-anchor="middle">右手をかぎ爪のように添える</text>
  <text x="650" y="160" class="note" text-anchor="middle" fill="#9b59b6" font-weight="700">緊張対策・ショートパット</text>

  <text x="520" y="195" class="keypt" fill="#888">上↓</text>

  <rect x="640" y="180" width="20" height="280" rx="4" fill="#444"/>

  <!-- LEFT hand UP (top, normal position) -->
  <ellipse cx="650" cy="240" rx="42" ry="36" fill="#f9c896" stroke="#c39972" stroke-width="2.5"/>
  <text x="650" y="237" class="lbl" text-anchor="middle" font-weight="700">左手</text>
  <text x="650" y="252" class="note" text-anchor="middle">（上／通常）</text>

  <!-- RIGHT hand DOWN (bottom) but in claw style -->
  <path d="M 615 348 Q 605 366 612 388 Q 620 406 638 408 L 662 408 Q 680 406 688 388 Q 695 366 685 348 Z" fill="#fcd9b4" stroke="#c39972" stroke-width="2.5"/>
  <text x="650" y="378" class="lbl" text-anchor="middle" font-weight="700">右手（爪）</text>
  <text x="650" y="394" class="note" text-anchor="middle">（下）</text>

  <text x="520" y="475" class="keypt" fill="#888">下↑</text>

  <rect x="540" y="490" width="220" height="80" rx="6" fill="#9b59b6" opacity="0.1" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="650" y="510" class="keypt" text-anchor="middle" fill="#9b59b6">ポイント</text>
  <text x="650" y="528" class="note" text-anchor="middle">手の位置：通常通り</text>
  <text x="650" y="544" class="note" text-anchor="middle">右手の握り方だけを爪型に</text>
  <text x="650" y="562" class="note" text-anchor="middle" font-weight="700" fill="#c0392b">→ 右手の余計な力が抜ける</text>
</svg>
