<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="ゴルフのコースマネジメントの考え方を示すホールレイアウト図">
  <defs>
    <linearGradient id="skyM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe9ff"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="fairwayM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7cb342"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
    <linearGradient id="roughM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33691e"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="greenM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aed581"/>
      <stop offset="100%" stop-color="#7cb342"/>
    </linearGradient>
    <radialGradient id="ballGradM" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
  </defs>

  <!-- Background sky -->
  <rect width="1200" height="630" fill="url(#skyM)"/>

  <!-- Rough (whole field) -->
  <rect x="0" y="180" width="1200" height="450" fill="url(#roughM)"/>

  <!-- Fairway (curved dogleg right) -->
  <path d="M 80 540 C 80 460, 200 380, 360 360 C 520 340, 680 320, 820 280 C 920 250, 990 240, 1060 250 L 1080 320 C 1010 320, 940 330, 860 360 C 720 410, 540 430, 360 430 C 220 430, 140 480, 140 540 Z" fill="url(#fairwayM)"/>

  <!-- Bunkers (left side / hazard area) -->
  <ellipse cx="500" cy="360" rx="55" ry="20" fill="#fff59d" stroke="#f9a825" stroke-width="2"/>
  <ellipse cx="600" cy="345" rx="40" ry="16" fill="#fff59d" stroke="#f9a825" stroke-width="2"/>

  <!-- Water hazard (right side) -->
  <path d="M 700 440 Q 800 410 880 425 Q 950 440 920 480 Q 850 510 760 495 Q 690 480 700 440 Z" fill="#4fc3f7" stroke="#0288d1" stroke-width="2"/>
  <path d="M 720 455 Q 800 445 880 455" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>

  <!-- Trees right -->
  <g>
    <ellipse cx="980" cy="450" rx="35" ry="40" fill="#1b5e20"/>
    <ellipse cx="1040" cy="470" rx="32" ry="38" fill="#2e7d32"/>
    <ellipse cx="1100" cy="450" rx="35" ry="42" fill="#1b5e20"/>
  </g>

  <!-- Green (around hole) -->
  <ellipse cx="1020" cy="290" rx="70" ry="30" fill="url(#greenM)" stroke="#558b2f" stroke-width="2"/>

  <!-- Hole + flag -->
  <ellipse cx="1030" cy="290" rx="6" ry="3" fill="#1b1b1b"/>
  <line x1="1030" y1="290" x2="1030" y2="220" stroke="#424242" stroke-width="2"/>
  <polygon points="1030,220 1075,232 1030,244" fill="#e53935"/>

  <!-- Tee box -->
  <rect x="80" y="520" width="80" height="30" rx="6" fill="#9e9e9e" stroke="#616161" stroke-width="2"/>
  <text x="120" y="540" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif" font-size="14" font-weight="700" fill="#fff">TEE</text>

  <!-- Ball at tee -->
  <circle cx="120" cy="510" r="7" fill="url(#ballGradM)" stroke="#9e9e9e" stroke-width="1"/>

  <!-- Smart line (recommended) -->
  <path d="M 120 510 Q 350 430 460 420" fill="none" stroke="#1b5e20" stroke-width="4" stroke-dasharray="0" stroke-linecap="round"/>
  <circle cx="460" cy="420" r="9" fill="#43a047" stroke="#1b5e20" stroke-width="2"/>
  <text x="460" y="425" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif" font-size="11" font-weight="800" fill="#fff">①</text>

  <path d="M 460 420 Q 700 380 880 350" fill="none" stroke="#1b5e20" stroke-width="4" stroke-linecap="round"/>
  <circle cx="880" cy="350" r="9" fill="#43a047" stroke="#1b5e20" stroke-width="2"/>
  <text x="880" y="355" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif" font-size="11" font-weight="800" fill="#fff">②</text>

  <path d="M 880 350 Q 950 320 1020 295" fill="none" stroke="#1b5e20" stroke-width="4" stroke-linecap="round"/>

  <!-- Risky line (dotted red) -->
  <path d="M 120 510 Q 400 350 700 320" fill="none" stroke="#e53935" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round"/>
  <text x="430" y="320" font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif" font-size="14" font-weight="800" fill="#c62828">攻めすぎ</text>
  <text x="430" y="338" font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif" font-size="12" font-weight="600" fill="#c62828">バンカー＆OBリスク</text>

  <!-- Labels -->
  <g font-family="'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif">
    <!-- Title box -->
    <rect x="40" y="40" width="600" height="125" rx="14" fill="#ffffff" opacity="0.94"/>
    <text x="60" y="88" font-size="32" font-weight="800" fill="#1b5e20">ゴルフのコースマネジメント</text>
    <text x="60" y="124" font-size="22" font-weight="700" fill="#2e7d32">「攻めずに、外さない」が90切りへの近道</text>
    <text x="60" y="152" font-size="15" font-weight="500" fill="#555">スコアを縮めるホール戦略の考え方</text>

    <!-- Legend box -->
    <rect x="800" y="40" width="360" height="125" rx="14" fill="#ffffff" opacity="0.94"/>
    <line x1="820" y1="78" x2="870" y2="78" stroke="#1b5e20" stroke-width="4" stroke-linecap="round"/>
    <text x="880" y="83" font-size="16" font-weight="700" fill="#1b5e20">推奨ライン（センター狙い）</text>
    <line x1="820" y1="113" x2="870" y2="113" stroke="#e53935" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round"/>
    <text x="880" y="118" font-size="16" font-weight="700" fill="#c62828">攻めすぎライン（ハイリスク）</text>
    <circle cx="845" cy="148" r="8" fill="#43a047" stroke="#1b5e20" stroke-width="2"/>
    <text x="845" y="152" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">①</text>
    <text x="880" y="153" font-size="16" font-weight="700" fill="#1b5e20">中継地点（刻みポイント）</text>

    <!-- Hazard labels -->
    <text x="500" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#bf360c">バンカー</text>
    <text x="800" y="465" text-anchor="middle" font-size="13" font-weight="700" fill="#0277bd">池</text>
    <text x="1040" y="525" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">林</text>

    <text x="1020" y="270" text-anchor="middle" font-size="14" font-weight="800" fill="#1b5e20">GREEN</text>

    <!-- Bottom strategy callouts -->
    <rect x="40" y="555" width="1120" height="60" rx="12" fill="#1b5e20" opacity="0.92"/>
    <text x="65" y="592" font-size="17" font-weight="800" fill="#fff">マネジメント3原則：</text>
    <text x="260" y="592" font-size="16" font-weight="600" fill="#fff">①自分の飛距離を知る　②センター狙いを基本に　③9割成功する選択をする</text>
  </g>
</svg>
