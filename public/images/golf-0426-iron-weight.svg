<svg viewBox="0 0 600 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="g3Arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
    <marker id="g3ArrowG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1e8449"/>
    </marker>
  </defs>

  <text x="300" y="26" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">アイアン｜体重と胸（重心）を左足（ターゲット側）へ</text>
  <text x="300" y="48" text-anchor="middle" font-size="12" fill="#555">体重80%を左足に・胸も左足の真上に乗せる</text>

  <!-- Ground -->
  <line x1="40" y1="395" x2="560" y2="395" stroke="#5dade2" stroke-width="3"/>

  <!-- ===== Left: Address (centered) ===== -->
  <g>
    <text x="160" y="425" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">①アドレス</text>
    <text x="160" y="442" text-anchor="middle" font-size="11" fill="#555">体重 50:50・胸も中央</text>

    <!-- Head -->
    <circle cx="160" cy="100" r="18" fill="#fff" stroke="#333" stroke-width="2"/>

    <!-- Torso (centered, vertical) -->
    <path d="M 142 118 Q 134 195 142 270 Q 160 275 178 270 Q 186 195 178 118 Z" fill="#f0f0f0" stroke="#333" stroke-width="2"/>

    <!-- Chest indicator (centered) -->
    <circle cx="160" cy="170" r="10" fill="#888" stroke="#555" stroke-width="1.5"/>
    <text x="160" y="174" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">胸</text>

    <!-- Center reference line -->
    <line x1="160" y1="285" x2="160" y2="392" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Arms holding club -->
    <path d="M 145 145 Q 132 200 168 232" stroke="#333" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M 175 145 Q 188 200 172 232" stroke="#333" stroke-width="4.5" fill="none" stroke-linecap="round"/>

    <!-- Club -->
    <line x1="170" y1="234" x2="200" y2="380" stroke="#5F5E5A" stroke-width="3"/>
    <path d="M 195 380 L 225 388 L 227 392 L 198 384 Z" fill="#999" stroke="#444" stroke-width="1.5"/>
    <circle cx="210" cy="385" r="5" fill="#fff" stroke="#222" stroke-width="1"/>

    <!-- Both legs equal, attached to body -->
    <rect x="145" y="270" width="13" height="115" fill="#aaa" stroke="#888" rx="3"/>
    <rect x="165" y="270" width="13" height="115" fill="#aaa" stroke="#888" rx="3"/>

    <!-- Both feet equal, directly under legs -->
    <ellipse cx="151" cy="392" rx="18" ry="6" fill="#bbb" stroke="#888" stroke-width="1.5"/>
    <ellipse cx="172" cy="392" rx="18" ry="6" fill="#bbb" stroke="#888" stroke-width="1.5"/>

    <!-- Weight % labels -->
    <text x="135" y="412" font-size="10" fill="#555" font-weight="bold">50%</text>
    <text x="180" y="412" font-size="10" fill="#555" font-weight="bold">50%</text>
  </g>

  <!-- Arrow between -->
  <line x1="255" y1="240" x2="320" y2="240" stroke="#3498db" stroke-width="3" marker-end="url(#g3Arrow)"/>
  <text x="287" y="225" text-anchor="middle" font-size="11" fill="#3498db" font-weight="bold">体重も胸も</text>
  <text x="287" y="262" text-anchor="middle" font-size="11" fill="#3498db" font-weight="bold">左足（ターゲット側）へ</text>

  <!-- ===== Right: Impact (MIRRORED - body shifts to viewer's RIGHT, weight on viewer's RIGHT foot = golfer's LEFT foot) ===== -->
  <g>
    <text x="450" y="425" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="bold">②インパクト</text>
    <text x="450" y="442" text-anchor="middle" font-size="11" fill="#1e8449">体重80%（左足）・胸が左足の真上</text>

    <!-- Center reference line of stance -->
    <line x1="450" y1="285" x2="450" y2="392" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Head shifted to viewer's RIGHT (golfer's LEFT / target side) -->
    <circle cx="480" cy="105" r="18" fill="#fff" stroke="#1e8449" stroke-width="2"/>

    <!-- Torso clearly tilted/shifted to viewer's RIGHT -->
    <path d="M 495 122 Q 508 195 485 273 Q 460 278 440 270 Q 430 195 452 120 Z" fill="#d5f5e3" stroke="#1e8449" stroke-width="2.5"/>

    <!-- Chest indicator clearly above viewer's RIGHT foot (= 左足) -->
    <circle cx="475" cy="170" r="11" fill="#27ae60" stroke="#0e6251" stroke-width="2"/>
    <text x="475" y="174" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">胸</text>

    <!-- Vertical line showing chest is over LEFT foot (viewer's right) -->
    <line x1="475" y1="180" x2="475" y2="385" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="525" y="220" font-size="10" fill="#1e8449" font-weight="bold">胸が</text>
    <text x="525" y="234" font-size="10" fill="#1e8449" font-weight="bold">左足の真上</text>

    <!-- Arms swinging through (mirrored) -->
    <path d="M 492 145 Q 508 200 470 235" stroke="#1e8449" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M 455 145 Q 442 200 460 235" stroke="#1e8449" stroke-width="4.5" fill="none" stroke-linecap="round"/>

    <!-- Club at impact (mirrored - extends to viewer's LEFT now) -->
    <line x1="462" y1="237" x2="445" y2="380" stroke="#5F5E5A" stroke-width="3"/>
    <path d="M 450 380 L 420 388 L 418 392 L 447 384 Z" fill="#999" stroke="#444" stroke-width="1.5"/>
    <circle cx="435" cy="385" r="5" fill="#fff" stroke="#222" stroke-width="1"/>
    <!-- Speed lines -->
    <line x1="452" y1="370" x2="465" y2="368" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
    <line x1="450" y1="378" x2="465" y2="380" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>

    <!-- LEFT leg of golfer (viewer's RIGHT, target side) - vertical, RED weighted -->
    <rect x="469" y="273" width="13" height="112" fill="#f9d7d3" stroke="#c0392b" stroke-width="2" rx="3"/>
    <!-- LEFT foot of golfer (viewer's RIGHT) - LARGE and RED (loaded) -->
    <ellipse cx="475" cy="392" rx="22" ry="8" fill="#e74c3c" stroke="#a93226" stroke-width="2.5"/>
    <text x="475" y="396" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">体重</text>

    <!-- RIGHT leg of golfer (viewer's LEFT, back side) - angled out -->
    <polygon points="458,273 445,273 420,383 430,386" fill="#ddd" stroke="#aaa" stroke-width="1.5"/>
    <!-- RIGHT foot of golfer (viewer's LEFT) - small, light -->
    <ellipse cx="422" cy="388" rx="13" ry="4" fill="#ddd" stroke="#aaa" stroke-width="1"/>

    <!-- Weight % labels -->
    <text x="465" y="412" font-size="12" fill="#a93226" font-weight="bold">80%</text>
    <text x="412" y="412" font-size="10" fill="#777" font-weight="bold">20%</text>

    <!-- Foot labels -->
    <text x="505" y="378" text-anchor="middle" font-size="9" fill="#a93226" font-weight="bold">左足</text>
    <text x="405" y="378" text-anchor="middle" font-size="9" fill="#777">右足</text>

    <!-- Big force arrow showing weight movement TO viewer's RIGHT (target) -->
    <line x1="345" y1="320" x2="400" y2="320" stroke="#1e8449" stroke-width="4" marker-end="url(#g3ArrowG)"/>
    <text x="372" y="310" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">ターゲット方向</text>
  </g>
</svg>
