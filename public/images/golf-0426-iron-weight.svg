<svg viewBox="0 0 600 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="g3Arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
    <marker id="g3Force" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f39c12"/>
    </marker>
  </defs>

  <text x="300" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">アイアン｜体重と胸（重心）をターゲット側の足へ</text>

  <!-- Ground -->
  <line x1="40" y1="395" x2="560" y2="395" stroke="#5dade2" stroke-width="3"/>

  <!-- ===== Left: Address (centered) ===== -->
  <g>
    <text x="130" y="425" text-anchor="middle" font-size="12" fill="#555" font-weight="bold">①アドレス（体重50:50）</text>
    <!-- Head -->
    <circle cx="130" cy="100" r="18" fill="#fff" stroke="#333" stroke-width="2"/>
    <!-- Torso (centered, slight tilt) -->
    <path d="M 113 118 Q 105 195 113 270 Q 130 275 147 270 Q 155 195 147 118 Z" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
    <!-- Chest indicator (centered) -->
    <circle cx="130" cy="170" r="8" fill="#3498db" stroke="#1f618d" stroke-width="1.5"/>
    <text x="130" y="174" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">胸</text>
    <!-- Arms holding club -->
    <path d="M 117 145 Q 105 200 145 230" stroke="#333" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M 143 145 Q 155 200 145 230" stroke="#333" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- Club -->
    <line x1="145" y1="232" x2="170" y2="380" stroke="#5F5E5A" stroke-width="3"/>
    <!-- Iron head -->
    <path d="M 165 380 L 195 388 L 197 392 L 168 384 Z" fill="#999" stroke="#444" stroke-width="1.5"/>
    <!-- Ball -->
    <circle cx="180" cy="385" r="5" fill="#fff" stroke="#222" stroke-width="1"/>
    <!-- Legs (both equally weighted) -->
    <rect x="115" y="270" width="13" height="115" fill="#aaa" stroke="#888" rx="3"/>
    <rect x="135" y="270" width="13" height="115" fill="#aaa" stroke="#888" rx="3"/>
    <!-- Both feet equal -->
    <ellipse cx="120" cy="392" rx="20" ry="6" fill="#bbb" stroke="#888" stroke-width="1.5"/>
    <ellipse cx="143" cy="392" rx="20" ry="6" fill="#bbb" stroke="#888" stroke-width="1.5"/>
    <!-- 50:50 label -->
    <text x="100" y="415" font-size="9" fill="#777">50%</text>
    <text x="155" y="415" font-size="9" fill="#777">50%</text>
  </g>

  <!-- Arrow between -->
  <line x1="240" y1="240" x2="305" y2="240" stroke="#3498db" stroke-width="3" marker-end="url(#g3Arrow)"/>
  <text x="272" y="225" text-anchor="middle" font-size="12" fill="#3498db" font-weight="bold">体重とともに</text>
  <text x="272" y="260" text-anchor="middle" font-size="12" fill="#3498db" font-weight="bold">胸もターゲットへ</text>

  <!-- ===== Right: Impact (weight + chest on target side / left foot) ===== -->
  <g>
    <text x="430" y="425" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">②インパクト（体重・胸が左へ）</text>
    <!-- Head shifted slightly left -->
    <circle cx="425" cy="100" r="18" fill="#fff" stroke="#1e8449" stroke-width="2"/>
    <!-- Torso shifted to target side (left foot side) -->
    <path d="M 405 118 Q 395 195 410 270 Q 430 275 450 270 Q 460 195 450 118 Z" fill="#d5f5e3" stroke="#1e8449" stroke-width="2"/>
    <!-- Chest indicator (shifted to target side / left) -->
    <circle cx="415" cy="170" r="9" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
    <text x="415" y="174" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">胸</text>
    <!-- Chest movement arrow -->
    <path d="M 432 165 Q 425 162 418 168" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#g3Force)"/>
    <text x="445" y="155" font-size="10" fill="#1e8449" font-weight="bold">胸が左へ</text>
    <!-- Arms swinging through -->
    <path d="M 410 145 Q 400 200 425 235" stroke="#1e8449" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M 445 145 Q 460 200 432 235" stroke="#1e8449" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- Club at impact -->
    <line x1="430" y1="237" x2="450" y2="380" stroke="#5F5E5A" stroke-width="3"/>
    <!-- Iron head striking ball -->
    <path d="M 445 380 L 475 388 L 477 392 L 448 384 Z" fill="#999" stroke="#444" stroke-width="1.5"/>
    <circle cx="460" cy="385" r="5" fill="#fff" stroke="#222" stroke-width="1"/>
    <!-- Speed lines on club -->
    <line x1="438" y1="370" x2="425" y2="368" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
    <line x1="441" y1="378" x2="425" y2="380" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
    <!-- Legs - left foot weighted, right foot light -->
    <rect x="395" y="270" width="13" height="115" fill="#f9d7d3" stroke="#c0392b" stroke-width="1.5" rx="3"/>
    <rect x="445" y="270" width="13" height="115" fill="#bbb" stroke="#888" rx="3"/>
    <!-- Left foot (target side - heavily weighted, RED) -->
    <ellipse cx="402" cy="392" rx="24" ry="8" fill="#e74c3c" stroke="#a93226" stroke-width="2"/>
    <text x="402" y="395" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">体重◎</text>
    <!-- Right foot (light) -->
    <ellipse cx="453" cy="392" rx="18" ry="5" fill="#ddd" stroke="#888" stroke-width="1"/>
    <!-- Weight % labels -->
    <text x="385" y="415" font-size="9" fill="#a93226" font-weight="bold">80%</text>
    <text x="455" y="415" font-size="9" fill="#777">20%</text>
    <!-- Target arrow -->
    <line x1="490" y1="385" x2="540" y2="385" stroke="#1e8449" stroke-width="2.5" marker-end="url(#g3Arrow)"/>
    <text x="515" y="375" text-anchor="middle" font-size="10" fill="#1e8449" font-weight="bold">ターゲット</text>
  </g>

  <!-- Bottom takeaway -->
  <text x="300" y="65" text-anchor="middle" font-size="12" fill="#555">体重だけでなく胸（重心）も一緒にターゲット側へ動かす</text>
</svg>
