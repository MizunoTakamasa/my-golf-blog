<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ゴルフクラブ番手別のボール位置比較｜スタンス中央を基準としてボール何個分左にずらすかを示した図">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
      .clb { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 12px; font-weight: 700; }
      .num { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 11px; fill: #555; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
  </defs>

  <rect width="800" height="460" fill="#f7faf7"/>
  <text x="400" y="38" class="ttl" text-anchor="middle">番手別のボール位置｜スタンス中央が基準</text>
  <text x="400" y="60" class="cap" text-anchor="middle">＊「ボール◯個分」は、スタンスの中央から左方向にボール何個分ずれているか</text>

  <!-- Player view from front -->
  <!-- Right foot -->
  <ellipse cx="200" cy="370" rx="55" ry="20" fill="#fff" stroke="#333" stroke-width="2.5"/>
  <text x="200" y="375" class="lbl" text-anchor="middle">右足</text>

  <!-- Left foot -->
  <ellipse cx="600" cy="370" rx="55" ry="20" fill="#fff" stroke="#333" stroke-width="2.5"/>
  <text x="600" y="375" class="lbl" text-anchor="middle">左足</text>

  <!-- Ground line / stance line -->
  <line x1="120" y1="395" x2="680" y2="395" stroke="#666" stroke-width="2"/>

  <!-- Stance center vertical reference line -->
  <line x1="400" y1="100" x2="400" y2="395" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="93" class="lbl" text-anchor="middle" fill="#e74c3c">スタンス中央（基準）</text>

  <!-- Ball-width scale (under the foot line) -->
  <text x="400" y="425" class="note" text-anchor="middle">←　ボール1個分＝約4〜4.3cm　→</text>

  <!-- ============================================== -->
  <!-- Ball positions (from right to left as viewed) -->
  <!-- 中央 = 400 -->
  <!-- 1 ball width ≈ 35px in this diagram -->

  <!-- (1) ウェッジ - center or right of center -->
  <circle cx="392" cy="345" r="11" fill="#9b59b6"/>
  <line x1="392" y1="345" x2="392" y2="135" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <rect x="345" y="115" width="100" height="22" rx="4" fill="#9b59b6"/>
  <text x="395" y="131" class="clb" text-anchor="middle" fill="#fff">ウェッジ</text>
  <text x="395" y="151" class="num" text-anchor="middle" fill="#9b59b6">中央〜やや右</text>

  <!-- (2) ミドル〜ショートアイアン (7〜PW) - center to slightly left ~0.5個分 -->
  <circle cx="418" cy="345" r="11" fill="#3498db"/>
  <line x1="418" y1="345" x2="418" y2="195" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <rect x="378" y="175" width="80" height="22" rx="4" fill="#3498db"/>
  <text x="418" y="191" class="clb" text-anchor="middle" fill="#fff">ミドル/ショート</text>
  <text x="418" y="211" class="num" text-anchor="middle" fill="#3498db">左へ約0.5個分</text>

  <!-- (3) ロングアイアン (4〜6) - 1.5 ball widths left -->
  <circle cx="455" cy="345" r="11" fill="#27ae60"/>
  <line x1="455" y1="345" x2="455" y2="255" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <rect x="408" y="235" width="100" height="22" rx="4" fill="#27ae60"/>
  <text x="458" y="251" class="clb" text-anchor="middle" fill="#fff">ロングアイアン</text>
  <text x="458" y="271" class="num" text-anchor="middle" fill="#27ae60">左へ約1.5個分</text>

  <!-- (4) 5W・UT - 2 ball widths left -->
  <circle cx="490" cy="345" r="11" fill="#f39c12"/>
  <line x1="490" y1="345" x2="490" y2="295" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <rect x="455" y="275" width="70" height="22" rx="4" fill="#f39c12"/>
  <text x="490" y="291" class="clb" text-anchor="middle" fill="#fff">5W・UT</text>
  <text x="490" y="311" class="num" text-anchor="middle" fill="#f39c12">左へ約2個分</text>

  <!-- (5) ドライバー - 3 ball widths left (left heel inside) -->
  <circle cx="546" cy="345" r="11" fill="#e67e22"/>
  <!-- subtle indicator line going down to inside of left foot -->
  <line x1="546" y1="356" x2="546" y2="370" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="508" y="333" width="90" height="22" rx="4" fill="#e67e22" opacity="0"/>
  <!-- driver label -->
  <text x="546" y="333" class="clb" text-anchor="middle" fill="#e67e22">ドライバー</text>
  <line x1="546" y1="370" x2="640" y2="345" stroke="#e67e22" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="635" y="332" width="120" height="22" rx="4" fill="#e67e22"/>
  <text x="695" y="348" class="clb" text-anchor="middle" fill="#fff">左へ約3個分</text>
  <text x="695" y="368" class="num" text-anchor="middle" fill="#e67e22">＝左足かかと内側</text>
</svg>
