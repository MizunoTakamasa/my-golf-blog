<svg viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ggArrR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c0392b"/>
    </marker>
    <marker id="ggArrB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2874a6"/>
    </marker>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">順目・逆目とパッティング</text>
  <text x="410" y="50" text-anchor="middle" font-size="13" fill="#555">芝の向きで、球の転がる速さが変わる</text>

  <!-- Divider -->
  <line x1="410" y1="68" x2="410" y2="295" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ============ Scenario 1: 順目 ============ -->
  <rect x="20" y="78" width="380" height="30" fill="#c0392b" rx="4"/>
  <text x="210" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">①順目（芝が向こう向き）→ 速い</text>

  <!-- Grass surface -->
  <line x1="35" y1="240" x2="395" y2="240" stroke="#1b5e20" stroke-width="2"/>
  <rect x="35" y="225" width="360" height="15" fill="#27ae60" opacity="0.25"/>

  <!-- Slanted blades pointing RIGHT (toward hole) -->
  <g stroke="#1e8449" stroke-linecap="round" stroke-width="1.6">
    <line x1="50" y1="240" x2="60" y2="226"/>
    <line x1="65" y1="240" x2="75" y2="226"/>
    <line x1="80" y1="240" x2="90" y2="226"/>
    <line x1="95" y1="240" x2="105" y2="226"/>
    <line x1="110" y1="240" x2="120" y2="226"/>
    <line x1="125" y1="240" x2="135" y2="226"/>
    <line x1="155" y1="240" x2="165" y2="226"/>
    <line x1="170" y1="240" x2="180" y2="226"/>
    <line x1="185" y1="240" x2="195" y2="226"/>
    <line x1="200" y1="240" x2="210" y2="226"/>
    <line x1="215" y1="240" x2="225" y2="226"/>
    <line x1="230" y1="240" x2="240" y2="226"/>
    <line x1="245" y1="240" x2="255" y2="226"/>
    <line x1="260" y1="240" x2="270" y2="226"/>
    <line x1="275" y1="240" x2="285" y2="226"/>
    <line x1="290" y1="240" x2="300" y2="226"/>
    <line x1="305" y1="240" x2="315" y2="226"/>
    <line x1="320" y1="240" x2="330" y2="226"/>
    <line x1="335" y1="240" x2="345" y2="226"/>
    <line x1="350" y1="240" x2="360" y2="226"/>
    <line x1="365" y1="240" x2="375" y2="226"/>
  </g>

  <!-- Grain direction arrow -->
  <line x1="55" y1="200" x2="370" y2="200" stroke="#c0392b" stroke-width="2" marker-end="url(#ggArrR)"/>
  <text x="210" y="192" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">芝目の向き</text>

  <!-- Ball -->
  <circle cx="80" cy="232" r="9" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="77" cy="229" r="1.3" fill="#ccc"/>
  <circle cx="83" cy="231" r="1.1" fill="#ccc"/>

  <!-- Hole -->
  <ellipse cx="365" cy="240" rx="9" ry="3" fill="#222"/>
  <line x1="370" y1="240" x2="370" y2="195" stroke="#a93226" stroke-width="1.5"/>
  <polygon points="370,195 370,209 388,202" fill="#c0392b"/>

  <!-- Trajectory: ball goes past hole -->
  <path d="M 90 232 Q 220 215 360 240" stroke="#c0392b" stroke-width="2" fill="none" stroke-dasharray="4,3"/>

  <!-- Speed indicator -->
  <text x="210" y="265" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">転がる ⤴ 弱めに打つ</text>

  <!-- ============ Scenario 2: 逆目 ============ -->
  <rect x="420" y="78" width="380" height="30" fill="#2874a6" rx="4"/>
  <text x="610" y="98" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">②逆目（芝が手前向き）→ 遅い</text>

  <!-- Grass surface -->
  <line x1="435" y1="240" x2="795" y2="240" stroke="#1b5e20" stroke-width="2"/>
  <rect x="435" y="225" width="360" height="15" fill="#1e8449" opacity="0.4"/>

  <!-- Slanted blades pointing LEFT (toward viewer, away from hole) -->
  <g stroke="#0e6251" stroke-linecap="round" stroke-width="1.8">
    <line x1="450" y1="240" x2="440" y2="226"/>
    <line x1="465" y1="240" x2="455" y2="226"/>
    <line x1="480" y1="240" x2="470" y2="226"/>
    <line x1="495" y1="240" x2="485" y2="226"/>
    <line x1="510" y1="240" x2="500" y2="226"/>
    <line x1="525" y1="240" x2="515" y2="226"/>
    <line x1="555" y1="240" x2="545" y2="226"/>
    <line x1="570" y1="240" x2="560" y2="226"/>
    <line x1="585" y1="240" x2="575" y2="226"/>
    <line x1="600" y1="240" x2="590" y2="226"/>
    <line x1="615" y1="240" x2="605" y2="226"/>
    <line x1="630" y1="240" x2="620" y2="226"/>
    <line x1="645" y1="240" x2="635" y2="226"/>
    <line x1="660" y1="240" x2="650" y2="226"/>
    <line x1="675" y1="240" x2="665" y2="226"/>
    <line x1="690" y1="240" x2="680" y2="226"/>
    <line x1="705" y1="240" x2="695" y2="226"/>
    <line x1="720" y1="240" x2="710" y2="226"/>
    <line x1="735" y1="240" x2="725" y2="226"/>
    <line x1="750" y1="240" x2="740" y2="226"/>
    <line x1="765" y1="240" x2="755" y2="226"/>
    <line x1="780" y1="240" x2="770" y2="226"/>
  </g>

  <!-- Grain direction arrow (pointing left, opposite to play direction) -->
  <line x1="770" y1="200" x2="455" y2="200" stroke="#2874a6" stroke-width="2" marker-end="url(#ggArrB)"/>
  <text x="610" y="192" text-anchor="middle" font-size="10" fill="#2874a6" font-weight="bold">芝目の向き（逆向き）</text>

  <!-- Ball -->
  <circle cx="480" cy="232" r="9" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="477" cy="229" r="1.3" fill="#ccc"/>
  <circle cx="483" cy="231" r="1.1" fill="#ccc"/>

  <!-- Hole -->
  <ellipse cx="765" cy="240" rx="9" ry="3" fill="#222"/>
  <line x1="770" y1="240" x2="770" y2="195" stroke="#a93226" stroke-width="1.5"/>
  <polygon points="770,195 770,209 788,202" fill="#c0392b"/>

  <!-- Trajectory: ball stops short -->
  <path d="M 490 232 Q 600 234 740 240" stroke="#2874a6" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <!-- "止まる" indicator at end of trajectory -->
  <line x1="738" y1="234" x2="744" y2="246" stroke="#2874a6" stroke-width="2"/>
  <line x1="744" y1="234" x2="738" y2="246" stroke="#2874a6" stroke-width="2"/>

  <!-- Speed indicator -->
  <text x="610" y="265" text-anchor="middle" font-size="13" fill="#2874a6" font-weight="bold">止まりやすい ⤵ 強めに打つ</text>

  <!-- ============ Bottom: how to identify grain ============ -->
  <rect x="20" y="305" width="780" height="160" fill="#fdf6ec" stroke="#d68910" stroke-width="1.5" rx="6"/>
  <text x="410" y="328" text-anchor="middle" font-size="14" fill="#9c640c" font-weight="bold">③芝目の見分け方</text>

  <!-- Two visual swatches -->
  <rect x="55" y="350" width="120" height="55" fill="#a9dfbf" stroke="#1e8449" stroke-width="1"/>
  <text x="115" y="372" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">順目</text>
  <text x="115" y="390" text-anchor="middle" font-size="10" fill="#0e6251">明るい・白っぽい</text>
  <text x="115" y="402" text-anchor="middle" font-size="10" fill="#0e6251">光って見える</text>

  <rect x="195" y="350" width="120" height="55" fill="#1e8449" stroke="#0e6251" stroke-width="1"/>
  <text x="255" y="372" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">逆目</text>
  <text x="255" y="390" text-anchor="middle" font-size="10" fill="#fff">暗い・緑が濃い</text>
  <text x="255" y="402" text-anchor="middle" font-size="10" fill="#fff">陰って見える</text>

  <text x="115" y="430" text-anchor="middle" font-size="10" fill="#9c640c" font-weight="bold">①芝の色を見る</text>
  <text x="255" y="430" text-anchor="middle" font-size="10" fill="#9c640c" font-weight="bold">同じ芝でも反対側から見ると逆</text>

  <!-- Right side tips -->
  <text x="345" y="358" font-size="11" fill="#9c640c" font-weight="bold">②グリーンエッジ（カラー）の倒れ</text>
  <text x="360" y="376" font-size="10" fill="#6e4c0f">カラーの芝が倒れている方向 ＝ 順目</text>

  <text x="345" y="402" font-size="11" fill="#9c640c" font-weight="bold">③カップ周りの傾斜・水の流れ</text>
  <text x="360" y="420" font-size="10" fill="#6e4c0f">水が流れる方向 ≒ 順目（多くの場合）</text>

  <text x="345" y="446" font-size="11" fill="#9c640c" font-weight="bold">④コウライほど影響大、ベントは少なめ</text>

  <text x="410" y="490" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">→ 順目は弱め・逆目は強め。コウライグリーンほど影響が大きい</text>
</svg>
