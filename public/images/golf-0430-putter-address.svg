<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ゴルフのパターアドレス｜スタンス幅・ボール位置・目線・前傾角度の基本姿勢の図解">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#3498db"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#e74c3c"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="800" height="540" fill="#f7faf7"/>
  <text x="400" y="40" class="ttl" text-anchor="middle">パターのアドレス｜基本姿勢</text>

  <!-- LEFT: 正面図 -->
  <text x="200" y="85" class="lbl" text-anchor="middle" fill="#27ae60">【正面から見た構え】</text>

  <!-- Ground line -->
  <line x1="80" y1="430" x2="320" y2="430" stroke="#666" stroke-width="2"/>

  <!-- Stick figure front view -->
  <!-- head -->
  <circle cx="200" cy="155" r="20" fill="#fff" stroke="#27ae60" stroke-width="3"/>
  <!-- body -->
  <line x1="200" y1="175" x2="200" y2="290" stroke="#27ae60" stroke-width="3"/>
  <!-- shoulders -->
  <line x1="170" y1="195" x2="230" y2="195" stroke="#27ae60" stroke-width="3"/>
  <!-- arms forming triangle to grip -->
  <line x1="170" y1="195" x2="195" y2="305" stroke="#27ae60" stroke-width="3"/>
  <line x1="230" y1="195" x2="205" y2="305" stroke="#27ae60" stroke-width="3"/>
  <!-- grip/hands -->
  <circle cx="200" cy="310" r="8" fill="#27ae60"/>
  <!-- putter shaft -->
  <line x1="200" y1="318" x2="195" y2="425" stroke="#333" stroke-width="2.5"/>
  <!-- putter head -->
  <rect x="180" y="423" width="35" height="8" fill="#333"/>
  <!-- ball -->
  <circle cx="195" cy="420" r="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <!-- legs - narrow stance -->
  <line x1="200" y1="290" x2="178" y2="425" stroke="#27ae60" stroke-width="3"/>
  <line x1="200" y1="290" x2="222" y2="425" stroke="#27ae60" stroke-width="3"/>

  <!-- Stance width annotation -->
  <line x1="178" y1="445" x2="222" y2="445" stroke="#3498db" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="200" y="465" class="note" text-anchor="middle" fill="#3498db">肩幅より少し狭く</text>

  <!-- Eye line annotation -->
  <line x1="200" y1="155" x2="285" y2="155" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="195" y1="155" x2="195" y2="415" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="290" y="158" class="note" fill="#e74c3c">目線</text>
  <text x="290" y="172" class="note" fill="#e74c3c">↓ボール真上</text>

  <!-- Ball position annotation -->
  <line x1="195" y1="420" x2="280" y2="450" stroke="#666" stroke-width="1"/>
  <text x="290" y="455" class="note" fill="#333">左目の真下</text>

  <!-- ============ -->
  <!-- RIGHT: 側面図 -->
  <text x="600" y="85" class="lbl" text-anchor="middle" fill="#27ae60">【真横から見た構え】</text>

  <!-- Ground line -->
  <line x1="480" y1="430" x2="720" y2="430" stroke="#666" stroke-width="2"/>

  <!-- Side view stick figure with forward lean -->
  <!-- head leaning forward -->
  <circle cx="595" cy="160" r="20" fill="#fff" stroke="#27ae60" stroke-width="3"/>
  <!-- back slightly bent forward -->
  <line x1="595" y1="178" x2="610" y2="290" stroke="#27ae60" stroke-width="3"/>
  <!-- arm hanging down to grip -->
  <line x1="610" y1="220" x2="615" y2="305" stroke="#27ae60" stroke-width="3"/>
  <!-- grip/hands -->
  <circle cx="615" cy="310" r="8" fill="#27ae60"/>
  <!-- putter shaft -->
  <line x1="615" y1="318" x2="615" y2="425" stroke="#333" stroke-width="2.5"/>
  <!-- ball -->
  <circle cx="612" cy="420" r="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <!-- legs slightly bent -->
  <line x1="610" y1="290" x2="603" y2="425" stroke="#27ae60" stroke-width="3"/>
  <line x1="610" y1="290" x2="615" y2="425" stroke="#27ae60" stroke-width="3"/>

  <!-- forward lean indication -->
  <line x1="595" y1="160" x2="595" y2="425" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 595 240 Q 600 245 605 250" fill="none" stroke="#e67e22" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="500" y="220" class="note" fill="#e67e22">腰から前傾</text>
  <text x="500" y="237" class="note" fill="#e67e22">アイアンより</text>
  <text x="500" y="253" class="note" fill="#e67e22">やや深め</text>

  <!-- weight balance indication -->
  <text x="730" y="340" class="note" fill="#3498db">体重</text>
  <text x="730" y="357" class="note" fill="#3498db">左右5:5</text>
  <text x="730" y="374" class="note" fill="#3498db">前後はやや前</text>

  <!-- Bottom checklist box -->
  <rect x="80" y="490" width="640" height="40" rx="6" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="100" y="515" class="lbl" fill="#27ae60">✓ スタンス幅：肩幅より狭め　/　✓ ボール位置：左目の真下　/　✓ 目線：ボール真上　/　✓ 前傾：腰から</text>

  <text x="400" y="475" class="cap" text-anchor="middle">図1：パターアドレスの4つのチェックポイント</text>
</svg>
