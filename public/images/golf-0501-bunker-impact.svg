<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" width="1100" height="540" font-family="'Hiragino Sans','Yu Gothic','Meiryo','Noto Sans JP',sans-serif">
  <rect width="1100" height="540" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="44" fill="#0f172a" font-size="22" font-weight="800">バンカーショットのインパクト：ボールの2〜3cm手前の砂を打つ（横から見た図）</text>
  <text x="40" y="70" fill="#64748b" font-size="14">クラブヘッドはボールに直接当てず、砂ごとボールを「持ち上げる」イメージ</text>

  <!-- sky -->
  <rect x="0" y="80" width="1100" height="240" fill="#e0f2fe"/>
  <!-- sand -->
  <rect x="0" y="320" width="1100" height="220" fill="#fde68a"/>
  <line x1="0" y1="320" x2="1100" y2="320" stroke="#d97706" stroke-width="2"/>
  <text x="60" y="510" fill="#92400e" font-size="14" font-weight="700">砂面</text>

  <!-- ball -->
  <circle cx="650" cy="305" r="16" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="650" y="285" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="700">ボール</text>

  <!-- sand entry point (2-3cm behind ball) -->
  <circle cx="560" cy="320" r="9" fill="#ef4444"/>
  <line x1="560" y1="320" x2="560" y2="220" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="430" y="180" width="280" height="40" rx="6" fill="#ef4444"/>
  <text x="570" y="206" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="800">クラブが入る位置（2〜3cm手前）</text>

  <!-- distance indicator between sand entry and ball -->
  <line x1="560" y1="345" x2="640" y2="345" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="560" y1="340" x2="560" y2="350" stroke="#0f172a" stroke-width="1.5"/>
  <line x1="640" y1="340" x2="640" y2="350" stroke="#0f172a" stroke-width="1.5"/>
  <text x="600" y="365" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">2〜3cm</text>

  <!-- sand explosion (debris) -->
  <g fill="#d97706" opacity="0.7">
    <circle cx="540" cy="280" r="3"/>
    <circle cx="560" cy="250" r="2"/>
    <circle cx="600" cy="240" r="3"/>
    <circle cx="640" cy="230" r="2"/>
    <circle cx="680" cy="240" r="3"/>
    <circle cx="700" cy="270" r="2"/>
    <circle cx="520" cy="250" r="2"/>
    <circle cx="580" cy="220" r="2"/>
    <circle cx="620" cy="210" r="2"/>
  </g>

  <!-- club path (steep, from outside-in) -->
  <path d="M380,140 Q 470,200 560,320 L 600,400" stroke="#0ea5e9" stroke-width="3" fill="none"/>
  <polygon points="600,400 597,388 605,392" fill="#0ea5e9"/>
  <text x="240" y="160" fill="#0369a1" font-size="14" font-weight="800">クラブの軌道（上から鋭角に）</text>

  <!-- club head (open face) -->
  <g transform="translate(560,320) rotate(-25)">
    <rect x="-30" y="-8" width="60" height="16" rx="3" fill="#475569" stroke="#0f172a" stroke-width="2"/>
    <line x1="-50" y1="-50" x2="-30" y2="-8" stroke="#475569" stroke-width="6"/>
  </g>
  <text x="490" y="380" fill="#475569" font-size="13" font-weight="700">フェースを開いたまま</text>

  <!-- target direction -->
  <g transform="translate(900,300)">
    <line x1="-30" y1="0" x2="40" y2="0" stroke="#16a34a" stroke-width="3" stroke-dasharray="8,4"/>
    <polygon points="40,0 30,-6 30,6" fill="#16a34a"/>
    <text x="-30" y="-10" fill="#15803d" font-size="13" font-weight="700">目標方向</text>
  </g>

  <!-- bottom info box -->
  <rect x="40" y="450" width="1020" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="60" y="478" fill="#0f172a" font-size="14" font-weight="800">ポイント：</text>
  <text x="60" y="500" fill="#334155" font-size="13">・狙うのはボールではなく「ボールの2〜3cm手前の砂」　・フェースは開いたままインパクト　・砂ごとボールを薄く取って運ぶイメージ</text>
</svg>
