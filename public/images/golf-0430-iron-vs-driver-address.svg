<svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ゴルフのアイアンとドライバーのアドレス比較｜ボール位置とスタンス幅の違いの図解">
  <defs>
    <style>
      .ttl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 22px; font-weight: 700; fill: #222; }
      .stl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 16px; font-weight: 700; fill: #fff; }
      .lbl { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 14px; font-weight: 600; fill: #333; }
      .note { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #555; }
      .cap { font-family: "Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>

  <rect width="800" height="540" fill="#f7faf7"/>
  <text x="400" y="40" class="ttl" text-anchor="middle">アドレス比較｜ボール位置とスタンス幅</text>

  <!-- DIVIDER -->
  <line x1="400" y1="70" x2="400" y2="510" stroke="#ddd" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- ========================= -->
  <!-- LEFT: ドライバー -->
  <rect x="60" y="70" width="290" height="38" rx="6" fill="#e67e22"/>
  <text x="205" y="95" class="stl" text-anchor="middle">ドライバー</text>

  <!-- Ground -->
  <line x1="50" y1="420" x2="350" y2="420" stroke="#666" stroke-width="2"/>

  <!-- Stick figure - wider stance -->
  <!-- head -->
  <circle cx="205" cy="160" r="20" fill="#fff" stroke="#e67e22" stroke-width="3"/>
  <!-- body -->
  <line x1="205" y1="180" x2="210" y2="295" stroke="#e67e22" stroke-width="3"/>
  <!-- shoulders -->
  <line x1="170" y1="200" x2="240" y2="200" stroke="#e67e22" stroke-width="3"/>
  <!-- arms to grip -->
  <line x1="170" y1="200" x2="200" y2="305" stroke="#e67e22" stroke-width="3"/>
  <line x1="240" y1="200" x2="210" y2="305" stroke="#e67e22" stroke-width="3"/>
  <!-- grip -->
  <circle cx="205" cy="310" r="7" fill="#e67e22"/>
  <!-- driver shaft (long) -->
  <line x1="205" y1="317" x2="265" y2="412" stroke="#333" stroke-width="2.5"/>
  <!-- driver head (large) -->
  <ellipse cx="270" cy="412" rx="22" ry="12" fill="#333"/>
  <!-- TEE -->
  <line x1="278" y1="420" x2="278" y2="395" stroke="#a06030" stroke-width="2"/>
  <!-- ball on tee (high) -->
  <circle cx="278" cy="392" r="7" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <!-- legs - WIDE stance -->
  <line x1="210" y1="295" x2="160" y2="415" stroke="#e67e22" stroke-width="3"/>
  <line x1="210" y1="295" x2="278" y2="415" stroke="#e67e22" stroke-width="3"/>

  <!-- Stance width annotation -->
  <line x1="160" y1="440" x2="278" y2="440" stroke="#3498db" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="219" y="458" class="note" text-anchor="middle" fill="#3498db" font-weight="700">肩幅より広め</text>

  <!-- Ball position indicator (left foot inside) -->
  <line x1="278" y1="420" x2="278" y2="475" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="278" y="490" class="lbl" text-anchor="middle" fill="#e74c3c">左足かかと内側</text>

  <text x="60" y="498" class="note">★ティーアップ高め</text>
  <text x="60" y="514" class="note">★アッパーブローのため</text>

  <!-- ========================= -->
  <!-- RIGHT: アイアン -->
  <rect x="450" y="70" width="290" height="38" rx="6" fill="#27ae60"/>
  <text x="595" y="95" class="stl" text-anchor="middle">アイアン</text>

  <!-- Ground -->
  <line x1="440" y1="420" x2="740" y2="420" stroke="#666" stroke-width="2"/>

  <!-- Stick figure - narrower stance -->
  <circle cx="595" cy="160" r="20" fill="#fff" stroke="#27ae60" stroke-width="3"/>
  <line x1="595" y1="180" x2="600" y2="295" stroke="#27ae60" stroke-width="3"/>
  <line x1="565" y1="200" x2="625" y2="200" stroke="#27ae60" stroke-width="3"/>
  <line x1="565" y1="200" x2="595" y2="305" stroke="#27ae60" stroke-width="3"/>
  <line x1="625" y1="200" x2="605" y2="305" stroke="#27ae60" stroke-width="3"/>
  <circle cx="600" cy="310" r="7" fill="#27ae60"/>
  <!-- iron shaft (shorter) -->
  <line x1="600" y1="317" x2="620" y2="415" stroke="#333" stroke-width="2.5"/>
  <!-- iron head (small wedge shape) -->
  <path d="M 612 416 L 638 414 L 638 422 L 612 420 Z" fill="#333"/>
  <!-- ball on ground -->
  <circle cx="625" cy="416" r="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <!-- legs - NARROWER stance -->
  <line x1="600" y1="295" x2="570" y2="415" stroke="#27ae60" stroke-width="3"/>
  <line x1="600" y1="295" x2="630" y2="415" stroke="#27ae60" stroke-width="3"/>

  <!-- Stance width annotation -->
  <line x1="570" y1="440" x2="630" y2="440" stroke="#3498db" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="600" y="458" class="note" text-anchor="middle" fill="#3498db" font-weight="700">肩幅程度</text>

  <!-- Ball position indicator (center) -->
  <line x1="625" y1="420" x2="625" y2="475" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="625" y="490" class="lbl" text-anchor="middle" fill="#e74c3c">中央〜やや左</text>

  <text x="450" y="498" class="note">★地面に直置き</text>
  <text x="450" y="514" class="note">★ダウンブローのため</text>

  <text x="400" y="525" class="cap" text-anchor="middle" fill="#888">図1：番手で「ボール位置」と「スタンス幅」を変える</text>
</svg>
