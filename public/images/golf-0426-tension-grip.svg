<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="g1Arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db"/>
    </marker>
    <marker id="g1Down" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#27ae60"/>
    </marker>
  </defs>

  <text x="300" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">打つ前の緊張 → グリップが自然と脱力する</text>

  <!-- Left: tense body before shot -->
  <g>
    <text x="140" y="395" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold">①体に緊張を作る</text>
    <!-- Head -->
    <circle cx="140" cy="100" r="20" fill="#fff" stroke="#c0392b" stroke-width="2"/>
    <!-- Tension lines around head -->
    <line x1="115" y1="80" x2="105" y2="70" stroke="#c0392b" stroke-width="2"/>
    <line x1="165" y1="80" x2="175" y2="70" stroke="#c0392b" stroke-width="2"/>
    <line x1="120" y1="105" x2="105" y2="105" stroke="#c0392b" stroke-width="2"/>
    <line x1="160" y1="105" x2="175" y2="105" stroke="#c0392b" stroke-width="2"/>
    <!-- Torso (tense) -->
    <path d="M 120 122 Q 110 200 118 280 Q 140 285 162 280 Q 170 200 160 122 Z" fill="#fadbd8" stroke="#c0392b" stroke-width="2.5"/>
    <!-- Arms holding club -->
    <path d="M 122 145 Q 115 200 130 250" stroke="#c0392b" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 158 145 Q 165 200 150 250" stroke="#c0392b" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Hands gripping (tight) -->
    <ellipse cx="140" cy="255" rx="20" ry="12" fill="#e74c3c" stroke="#a93226" stroke-width="2"/>
    <text x="140" y="259" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">強</text>
    <!-- Grip pressure label -->
    <text x="195" y="245" font-size="11" fill="#a93226" font-weight="bold">握力：強い</text>
    <line x1="190" y1="248" x2="165" y2="255" stroke="#a93226" stroke-width="1.5"/>
    <!-- Club shaft -->
    <line x1="140" y1="265" x2="155" y2="370" stroke="#5F5E5A" stroke-width="3"/>
    <!-- Legs -->
    <rect x="125" y="280" width="14" height="100" fill="#888" rx="3"/>
    <rect x="143" y="280" width="14" height="100" fill="#888" rx="3"/>
  </g>

  <!-- Arrow between -->
  <line x1="220" y1="200" x2="290" y2="200" stroke="#3498db" stroke-width="3" marker-end="url(#g1Arrow)"/>
  <text x="255" y="190" text-anchor="middle" font-size="12" fill="#3498db" font-weight="bold">体に力が入る</text>
  <text x="255" y="218" text-anchor="middle" font-size="12" fill="#3498db">↓</text>
  <text x="255" y="235" text-anchor="middle" font-size="12" fill="#27ae60">手は逆に脱力</text>

  <!-- Right: relaxed grip with body still tense -->
  <g>
    <text x="430" y="395" text-anchor="middle" font-size="13" fill="#27ae60" font-weight="bold">②握る力が自然と抜ける</text>
    <!-- Head -->
    <circle cx="430" cy="100" r="20" fill="#fff" stroke="#1e8449" stroke-width="2"/>
    <!-- Torso (still firm/engaged) -->
    <path d="M 410 122 Q 400 200 408 280 Q 430 285 452 280 Q 460 200 450 122 Z" fill="#fadbd8" stroke="#c0392b" stroke-width="2.5"/>
    <!-- Arms -->
    <path d="M 412 145 Q 405 200 420 250" stroke="#27ae60" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 448 145 Q 455 200 440 250" stroke="#27ae60" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Hands gripping (relaxed) -->
    <ellipse cx="430" cy="255" rx="20" ry="12" fill="#a9dfbf" stroke="#1e8449" stroke-width="2"/>
    <text x="430" y="259" text-anchor="middle" font-size="10" fill="#0e6251" font-weight="bold">弱</text>
    <!-- Grip pressure label -->
    <text x="485" y="245" font-size="11" fill="#1e8449" font-weight="bold">握力：軽い</text>
    <line x1="480" y1="248" x2="455" y2="255" stroke="#1e8449" stroke-width="1.5"/>
    <!-- Down arrow on grip -->
    <line x1="430" y1="270" x2="430" y2="295" stroke="#27ae60" stroke-width="3" marker-end="url(#g1Down)"/>
    <!-- Club shaft -->
    <line x1="430" y1="295" x2="445" y2="370" stroke="#5F5E5A" stroke-width="3"/>
    <!-- Legs -->
    <rect x="415" y="280" width="14" height="100" fill="#888" rx="3"/>
    <rect x="433" y="280" width="14" height="100" fill="#888" rx="3"/>
  </g>

  <!-- Bottom takeaway -->
  <text x="300" y="65" text-anchor="middle" font-size="12" fill="#555">体に緊張を作っておくと、不思議と手の力は抜ける</text>
</svg>
